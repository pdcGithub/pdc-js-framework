<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>整个框架的测试页面</title>
</head>
<body>
    <!-- 
    说明：这里是 整个框架的测试程序。
        为了方便测试，我这里一般都是直接运行 js 代码，然后把结果写入 页面的结果区。即 id 是 result 的 div 区域
    -->
    <div id="result">
    </div>
    
    <!-- 这里是运行测试过程的代码 -->
    <script type="module">
    // 导入测试函数
    import { testClassCreationError, testParameterError, testVerificationError } from "./models/testErrors.js";
    import { testObjectLiteral } from "./models/testNormal.js";
    import { 
        // == 
        testIsNullValue, testNotNullValue,
        testIsStringValue, testIsStringObject, testIsString, testIsEmptyString, testValueOfString,
        testIsBooleanValue, testIsBooleanObject, testIsBoolean, testValueOfBoolean,
        testIsNumberValue, testIsNumberObject, testIsNumber, testValueOfNumber,
        testIsSymbol, testIsRegexp, testIsRegexpOk,
        // == 
        testIsFunction, testIsClass, testIsTargetClass, testIsObject, testIsObjectLiteral,
        testIsTargetObject, testIsTargetObjectSet, testIsTargetObjectArray, testIsTargetObject2DArray,
        testIsHtmlElement, testIsHtmlElementList,
        // == 
        testToLowerCase, testToUpperCase, 
        testObjToMap, testGenMap, testCopyObject, testMergeObject, testMergeObjectIgnoreCase,
        testHtmlElementListToArray, 
        // == 
        testDataUtil
    } from "./utils/testDatatype.js";
    import { 
        testThrowError, testThrowParameterError, testThrowClassCreationError, testThrowCannotNewError,

        testValidString, testValidBoolean, testValidNumber, testValidRegExp, testValidFunction,
        testValidClass, testValidTargetClass, testValidObject, testValidArray, testValid2DArray,
        testValidObjectLiteral, testValidTargetObject, testValidTargetObjectSet, testValidTargetObjectArray, testValidTargetObject2DArray,
        testValidHtmlElement, testValidHtmlElementList,

        testHandleDescInfoObj,
        testAutoVnAofString, testAutoVnAofNumber, testAutoVnAofBoolean, testAutoVnAofRegExp,
        testAutoVnAofMap, testAutoVnAofSet, testAutoVnAofArray, testAutoVnAof2DArray,
        testAutoVnAofObjectLiteral, testAutoVnAofTargetObject, testAutoVnAofTargetObjectSet, testAutoVnAofTargetObjectArray,
        testAutoVnAofTargetObject2DArray, testAutoVnAofHtmlElement, testAutoVnAofHtmlElementList,

        testValidUtil
    } from "./utils/testValid.js";
    import { testMyToString, testMystdout } from "./utils/testString.js";
    import { testDomParser, testDrawTag } from "./utils/testHtml.js";

    import {
        testMyElecApi, testIsInApp, 
        testErrorAlert, testUnhandledrejectionAlert, 
        testDocumentReady, testActionBinding, testActionBindingBySelector
    } from "./uiComponents/testInit.js";

    import { testEventName, testEventObject } from "./uiComponents/testEvents.js";
    import { testConstants, testMyRandNumStr } from "./uiComponents/testUitools.js";

    import {
        testBootstrap5ObjectCreate, testBootstrap5ObjectAble, testBootstrap5ObjectGet, testBootstrap5ObjectAdd,
        testBootstrap5ObjectRemove, testBootstrap5ObjectHas, testBootstrap5ObjectClear, testBootstrap5ObjectTo,
        testBootstrap5ObjectProteced,
        testStaticModule
    } from "./uiComponents/testStatic.js";

    import {
        testBs5EffConstructor, testBs5EffGet, testBs5EffSet, testBs5EffHtmlString,
        testBs5EffHtmlObject, testBs5EffWrite, testBs5EffShowAndHide, testBs5EffAble,
        testBs5EffModule
    } from "./uiComponents/testDynamic.js";

    import {
        testIsContentObject, testIsContentObjectArray, testIsContentObjectSet, testIsContentObject2DArray,
        testIsChildrenComponent, testIsChildrenComponentArray, testIsChildrenComponent2DArray
    } from "./uiComponents/testUidatatype.js";

    // 导入 report 函数
    import { report } from "./testTools.js";

    // 执行测试
    report('models/errors.js', testClassCreationError, testParameterError, testVerificationError);
    report('models/normal.js', testObjectLiteral);
    report('utils/datatype.js', testIsNullValue, testNotNullValue,
                                testIsStringValue, testIsStringObject, testIsString, testIsEmptyString, testValueOfString,
                                testIsBooleanValue, testIsBooleanObject, testIsBoolean, testValueOfBoolean,
                                testIsNumberValue, testIsNumberObject, testIsNumber, testValueOfNumber,
                                testIsSymbol, testIsRegexp, testIsRegexpOk,
                                // == 
                                testIsFunction, testIsClass, testIsTargetClass, testIsObject, testIsObjectLiteral,
                                testIsTargetObject, testIsTargetObjectSet, testIsTargetObjectArray, testIsTargetObject2DArray,
                                testIsHtmlElement, testIsHtmlElementList,
                                // == 
                                testToLowerCase, testToUpperCase, 
                                testObjToMap, testGenMap, testCopyObject, testMergeObject, testMergeObjectIgnoreCase,
                                testHtmlElementListToArray, 
                                // == 
                                testDataUtil);
    report('utils/valid.js', testThrowError, testThrowParameterError, testThrowClassCreationError, testThrowCannotNewError,

                            testValidString, testValidBoolean, testValidNumber, testValidRegExp, testValidFunction,
                            testValidClass, testValidTargetClass, testValidObject, testValidArray, testValid2DArray,
                            testValidObjectLiteral, testValidTargetObject, testValidTargetObjectSet, testValidTargetObjectArray, testValidTargetObject2DArray,
                            testValidHtmlElement, testValidHtmlElementList,

                            testHandleDescInfoObj,
                            testAutoVnAofString, testAutoVnAofNumber, testAutoVnAofBoolean, testAutoVnAofRegExp,
                            testAutoVnAofMap, testAutoVnAofSet, testAutoVnAofArray, testAutoVnAof2DArray,
                            testAutoVnAofObjectLiteral, testAutoVnAofTargetObject, testAutoVnAofTargetObjectSet, testAutoVnAofTargetObjectArray,
                            testAutoVnAofTargetObject2DArray, testAutoVnAofHtmlElement, testAutoVnAofHtmlElementList,

                            testValidUtil);
    report('utils/string.js', testMyToString, testMystdout);
    report('utils/html.js', testDomParser, testDrawTag);

    report('uiComponents/init.js', testMyElecApi, testIsInApp, 
                                testErrorAlert, testUnhandledrejectionAlert, 
                                testDocumentReady, testActionBinding, testActionBindingBySelector);

    report('uiComponents/events.js', testEventName, testEventObject);
    report('uiComponents/uitools.js', testConstants, testMyRandNumStr);

    report('uiComponents/static.js', testBootstrap5ObjectCreate, testBootstrap5ObjectAble, testBootstrap5ObjectGet, testBootstrap5ObjectAdd,
                                    testBootstrap5ObjectRemove, testBootstrap5ObjectHas, testBootstrap5ObjectClear, testBootstrap5ObjectTo,
                                    testBootstrap5ObjectProteced,
                                    testStaticModule);

    report('uiComponents/dynamic.js', testBs5EffConstructor, testBs5EffGet, testBs5EffSet, testBs5EffHtmlString,
                                    testBs5EffHtmlObject, testBs5EffWrite, testBs5EffShowAndHide, testBs5EffAble,
                                    testBs5EffModule);
    report('uiComponents/uidatatype.js', testIsContentObject, testIsContentObjectArray, testIsContentObjectSet, testIsContentObject2DArray,
                                        testIsChildrenComponent, testIsChildrenComponentArray, testIsChildrenComponent2DArray);

    // 打开 thirdparty 中 bootstrap5 的测试页面
    window.open('thirdpartys/bootstrap5/testBootstrap5.html', 'bsTestWindow');

    </script>
</body>
</html>
